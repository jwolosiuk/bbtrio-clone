<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Blueberry Trio</title>
<style>
  :root {
    --bg: #faf7f2;
    --ink: #1a1a1a;
    --muted: #8a8a8a;
    --line: #1a1a1a;
    --thin: #cfc9bf;
    --berry: #3b2a78;
    --berry-shine: #8a7ad6;
    --leaf: #4a8a4a;
    --mark: #b8b1a4;
    --clue-bg: #efe9dc;
    --good: #2a8a4a;
    --bad: #c0392b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    -webkit-text-size-adjust: 100%;
  }
  body { min-height: 100dvh; display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px 48px; }
  header { text-align: center; margin-bottom: 16px; }
  h1 { margin: 0 0 6px; font-size: 22px; font-weight: 600; letter-spacing: 0.2px; }
  .rule { margin: 0; color: var(--muted); font-size: 13px; max-width: 32em; line-height: 1.45; }

  .board-wrap {
    display: inline-grid;
    grid-template-columns: 16px auto;
    grid-template-rows: 16px auto;
    gap: 4px;
    position: relative;
  }
  .col-labels {
    grid-column: 2; grid-row: 1;
    display: grid;
    color: var(--muted); font-size: 11px;
    font-family: ui-monospace, monospace;
    text-align: center;
  }
  .row-labels {
    grid-column: 1; grid-row: 2;
    display: grid;
    color: var(--muted); font-size: 11px;
    font-family: ui-monospace, monospace;
    align-items: center; justify-items: center;
  }
  .board {
    grid-column: 2; grid-row: 2;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
    width: min(92vw, 480px);
    aspect-ratio: 1 / 1;
    background: var(--bg);
    border: 2.5px solid var(--line);
    user-select: none;
    touch-action: none;
    overscroll-behavior: contain;
  }
  .cell {
    position: relative;
    border-right: 1px solid var(--thin);
    border-bottom: 1px solid var(--thin);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: var(--bg);
    transition: background 120ms ease;
    touch-action: none;
  }
  .cell.edge-r { border-right: none; }
  .cell.edge-b { border-bottom: none; }
  .cell.br { border-right: 2.5px solid var(--line); }
  .cell.bb { border-bottom: 2.5px solid var(--line); }
  .cell.given { cursor: default; background: var(--bg); }

  .cell.clue { cursor: default; background: var(--clue-bg); font-weight: 600; font-size: 20px; transition: color 180ms ease; }
  .cell.clue.satisfied { color: rgba(26, 26, 26, 0.22); }
  @media (hover: hover) {
    .cell:hover:not(.clue) { background: #f1ece2; }
  }
  .cell:focus { outline: none; }

  .berry {
    width: 64%; height: 64%;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, var(--berry-shine) 0%, var(--berry) 55%, #241a4d 100%);
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.25);
    position: relative;
  }
  .berry::after {
    content: "";
    position: absolute;
    top: -10%; left: 38%;
    width: 22%; height: 16%;
    background: var(--leaf);
    border-radius: 60% 40% 60% 40% / 60% 40% 60% 40%;
    transform: rotate(-25deg);
  }
  .mark {
    width: 38%; height: 38%;
    color: var(--mark);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; line-height: 1; font-weight: 400;
  }
  .cell.bad { background: #f7d8d4; }
  .cell.bad.clue { background: #f0c0bb; }

  .controls { display: flex; gap: 10px; margin-top: 18px; align-items: center; }
  button {
    appearance: none; border: 1.5px solid var(--line); background: var(--bg);
    color: var(--ink); padding: 8px 14px; font: inherit; font-size: 14px;
    border-radius: 999px; cursor: pointer; transition: background 120ms ease;
    touch-action: manipulation;
  }
  @media (hover: hover) {
    button:hover { background: #efe9dc; }
  }
  button:disabled { opacity: 0.4; cursor: default; }
  button.active { background: var(--line); color: var(--bg); }
  .status {
    font-size: 13px; color: var(--muted);
    min-height: 1.2em; margin-top: 14px;
    text-align: center;
  }
  .status:empty { margin-top: 0; min-height: 0; }
  .status.win { color: var(--good); font-weight: 600; font-size: 15px; }
  .analysis {
    margin-top: 10px; max-width: 32em;
    font-size: 12px; color: var(--ink); opacity: 0.85;
    font-family: ui-monospace, monospace;
    line-height: 1.55;
  }
  .analysis div { padding: 1px 0; }
  .analysis .good { color: var(--good); }
  .analysis .trial { color: var(--bad); }

  .build-info {
    position: fixed; bottom: 6px; right: 8px;
    font-size: 10px; color: var(--muted); opacity: 0.6;
    font-family: ui-monospace, monospace; letter-spacing: 0.3px;
    user-select: text; -webkit-user-select: text;
  }
  .build-info a { color: inherit; text-decoration: none; }
  .build-info a:hover { text-decoration: underline; }
  .build-info .dl { cursor: pointer; margin-right: 8px; }
  .legend { margin-top: 14px; color: var(--muted); font-size: 12px; }
  .legend kbd {
    background: #efe9dc; border: 1px solid var(--thin); border-bottom-width: 2px;
    border-radius: 4px; padding: 1px 6px; font-size: 11px; font-family: inherit;
  }
  .tabs {
    display: flex; gap: 6px; justify-content: center;
    margin: 12px 0 10px;
  }
  .tab {
    appearance: none; border: 1.5px solid var(--thin); background: var(--bg);
    color: var(--muted); padding: 6px 12px; font: inherit; font-size: 13px;
    border-radius: 999px; cursor: pointer; transition: background 120ms ease;
    touch-action: manipulation;
  }
  .tab.active { border-color: var(--line); color: var(--ink); font-weight: 600; }
  .tab.locked { opacity: 0.45; cursor: default; }
  .tab.done { color: var(--good); border-color: var(--good); }
  .tab.done.active { font-weight: 600; }
  .timer {
    font-variant-numeric: tabular-nums;
    font-size: 13px; color: var(--muted);
    margin-top: 6px; letter-spacing: 0.5px;
  }
  .timer.win { color: var(--good); }
</style>
</head>
<body>
  <header>
    <h1>Blueberry Trio</h1>
    <p class="rule">Place 3 berries in each row, column, and block. Each number must be touched by exactly that many berries (8 neighbors).</p>
    <div id="tabs" class="tabs" role="tablist"></div>
    <div id="timer" class="timer" aria-label="Elapsed time">00:00</div>
    <div id="undo-count" class="timer" aria-label="Undo count" style="margin-top:2px;"></div>
  </header>

  <div class="board-wrap">
    <div id="col-labels" class="col-labels"></div>
    <div id="row-labels" class="row-labels"></div>
    <div id="board" class="board" aria-label="Puzzle board"></div>
  </div>

  <div class="controls">
    <button id="undo" type="button" disabled>Undo</button>
    <button id="check" type="button">Check</button>
    <button id="reset" type="button">Reset</button>
    <button id="log" type="button" style="display:none">Log</button>
  </div>
  <div id="status" class="status" role="status" aria-live="polite"></div>
  <div id="analysis" class="analysis"></div>
  <p class="legend">Click to mark <kbd>×</kbd>. <kbd>Click</kbd> again for a berry. Once more to clear.</p>
  <div id="build-info" class="build-info"></div>

<script>
(() => {
  // Fallback puzzle used if puzzle.txt can't be fetched (e.g. file:// origin).
  // Live puzzle is in puzzle.txt; see there for the format.
  const FALLBACK_PUZZLE = `
..3.3.
3.....
...5..
..4...
.....3
..3...

AAABBB
AAABBB
CCCDDD
CCCDDD
EEEFFF
EEEFFF
`;

  function parsePuzzle(text) {
    // Tokens: '.', '1'-'9', 'x'/'X' in the cells grid; any letter for groups.
    // Decoration characters |, _, -, +, spaces are ignored inside a line.
    // Truly blank lines separate the two grids. Lines starting with '#' are comments.
    const raw = text.split(/\r?\n/);
    const blocks = [];
    let cur = [];
    for (const ln of raw) {
      const trimmed = ln.trim();
      if (trimmed.startsWith("#")) continue;
      if (trimmed === "") { if (cur.length) { blocks.push(cur); cur = []; } continue; }
      const stripped = ln.replace(/[|_\-+\s]/g, "");
      if (stripped === "") continue; // pure decoration, e.g. "------+------"
      cur.push(stripped);
    }
    if (cur.length) blocks.push(cur);
    if (blocks.length < 2) throw new Error("puzzle needs a cells grid and a groups grid");
    const cellLines = blocks[0], groupLines = blocks[1];
    const n = cellLines.length;
    if (groupLines.length !== n) throw new Error(`grids differ: ${n} cell rows vs ${groupLines.length} group rows`);
    for (let r = 0; r < n; r++) {
      if (cellLines[r].length !== n) throw new Error(`cells row ${r} is ${cellLines[r].length} chars after stripping, expected ${n}`);
      if (groupLines[r].length !== n) throw new Error(`groups row ${r} is ${groupLines[r].length} chars after stripping, expected ${n}`);
    }
    const clues = {};
    const givens = {};
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        const ch = cellLines[r][c];
        if (ch === ".") continue;
        if (ch === "x" || ch === "X") { givens[`${r},${c}`] = true; continue; }
        if (/[0-9]/.test(ch)) { clues[`${r},${c}`] = Number(ch); continue; }
        throw new Error(`unknown cell char '${ch}' at (${r},${c})`);
      }
    }
    const groupOf = Array.from({ length: n }, () => Array(n).fill(null));
    const counts = {};
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++) {
        const g = groupLines[r][c];
        groupOf[r][c] = g;
        counts[g] = (counts[g] || 0) + 1;
      }
    // For "Trio" rules each group must contain (SIZE / 3) * some_count berries.
    // On supported sizes the number of berries per row/col/group is SIZE/3 when SIZE=9,
    // but classic rules fix it at 3. Groups therefore must have SIZE cells each.
    const groupSize = n; // each group has exactly SIZE cells
    for (const g in counts)
      if (counts[g] !== groupSize) throw new Error(`group '${g}' has ${counts[g]} cells, expected ${groupSize}`);
    // Berries per row/col/group: classic BBTrio is 3; scales up to 3 even on 9x9 as per your image (0 clue = "no berry nearby").
    return { SIZE: n, PER: 3, clues, givens, groupOf };
  }

  let SIZE, PER, clues, givens, groupOf;
  function applyPuzzle(text) {
    const p = parsePuzzle(text);
    SIZE = p.SIZE; PER = p.PER; clues = p.clues; givens = p.givens; groupOf = p.groupOf;
  }
  function activateCategoryPuzzle(cat) {
    const p = puzzleDefs[cat];
    SIZE = p.SIZE; PER = p.PER; clues = p.clues; givens = p.givens; groupOf = p.groupOf;
    DIFFICULTY_DEPTH = p.difficulty;
  }

  const blockId = (r, c) => groupOf[r][c];
  const isClueCell = (r, c) => (`${r},${c}` in clues);
  const isGivenCell = (r, c) => (`${r},${c}` in givens);

  // Precomputed groups and clue neighbors for the solver.
  let ROWS, COLS, BLOCKS, CLUE_LIST, DIFFICULTY_DEPTH;
  const DIFF_LABELS = ["Trivial", "Easy", "Medium", "Hard", "Expert", "Grandmaster"];
  function buildSolverTables() {
    ROWS = []; COLS = []; BLOCKS = [];
    for (let r = 0; r < SIZE; r++) {
      const g = [];
      for (let c = 0; c < SIZE; c++) if (!isClueCell(r, c)) g.push([r, c]);
      ROWS.push(g);
    }
    for (let c = 0; c < SIZE; c++) {
      const g = [];
      for (let r = 0; r < SIZE; r++) if (!isClueCell(r, c)) g.push([r, c]);
      COLS.push(g);
    }
    const bm = {};
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (!isClueCell(r, c)) (bm[blockId(r, c)] ||= []).push([r, c]);
    BLOCKS = Object.values(bm);
    CLUE_LIST = Object.entries(clues).map(([k, v]) => {
      const [r, c] = k.split(",").map(Number);
      const ns = [];
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nc < 0 || nr >= SIZE || nc >= SIZE) continue;
          if (!isClueCell(nr, nc)) ns.push([nr, nc]);
        }
      return { r, c, v, ns };
    });
  }
  function solverPropagate(s) {
    let changed;
    do {
      changed = false;
      for (const group of [...ROWS, ...COLS, ...BLOCKS]) {
        let berries = 0, open = 0;
        for (const [r, c] of group) {
          if (s[r][c] === 1) berries++;
          else if (s[r][c] === 0) open++;
        }
        const need = PER - berries;
        if (need < 0 || need > open) return false;
        if (open === 0) continue;
        if (need === 0) {
          for (const [r, c] of group) if (s[r][c] === 0) { s[r][c] = 2; changed = true; }
        } else if (need === open) {
          for (const [r, c] of group) if (s[r][c] === 0) { s[r][c] = 1; changed = true; }
        }
      }
      for (const { v, ns } of CLUE_LIST) {
        let berries = 0, open = 0;
        for (const [nr, nc] of ns) {
          if (s[nr][nc] === 1) berries++;
          else if (s[nr][nc] === 0) open++;
        }
        const need = v - berries;
        if (need < 0 || need > open) return false;
        if (open === 0) continue;
        if (need === 0) {
          for (const [nr, nc] of ns) if (s[nr][nc] === 0) { s[nr][nc] = 2; changed = true; }
        } else if (need === open) {
          for (const [nr, nc] of ns) if (s[nr][nc] === 0) { s[nr][nc] = 1; changed = true; }
        }
      }
    } while (changed);
    return true;
  }
  function solverComplete(s) {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (!isClueCell(r, c) && s[r][c] === 0) return false;
    return true;
  }
  // Returns true if `s` is provably contradictory via at most `depth` levels
  // of nested trial: depth 0 only uses propagation; depth D succeeds if some
  // undecided cell has BOTH values failing at depth D-1.
  function isContradictory(s, depth) {
    const cp = s.map(row => row.slice());
    if (!solverPropagate(cp)) return true;
    if (depth <= 0 || solverComplete(cp)) return false;
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        if (isClueCell(r, c) || cp[r][c] !== 0) continue;
        let bothFail = true;
        for (const v of [1, 2]) {
          const t = cp.map(row => row.slice());
          t[r][c] = v;
          if (!isContradictory(t, depth - 1)) { bothFail = false; break; }
        }
        if (bothFail) return true;
      }
    return false;
  }
  // Nishio BFS: iteratively deepen. Returns {solved, maxUsed} where
  // maxUsed is the deepest lookahead needed across all forced moves.
  function solveNishio(maxDepth) {
    let state = solverStartingState();
    let maxUsed = 0;
    while (true) {
      if (!solverPropagate(state)) return { solved: false, maxUsed };
      if (solverComplete(state)) return { solved: true, maxUsed, solution: state };
      let progress = false;
      for (let depth = 1; depth <= maxDepth && !progress; depth++) {
        for (let r = 0; r < SIZE && !progress; r++)
          for (let c = 0; c < SIZE && !progress; c++) {
            if (isClueCell(r, c) || state[r][c] !== 0) continue;
            for (const v of [1, 2]) {
              const t = state.map(row => row.slice());
              t[r][c] = v;
              if (isContradictory(t, depth - 1)) {
                state[r][c] = v === 1 ? 2 : 1;
                if (depth > maxUsed) maxUsed = depth;
                progress = true;
                break;
              }
            }
          }
      }
      if (!progress) return { solved: false, maxUsed, solution: state };
    }
  }
  // Full DFS fallback when Nishio alone can't finish — used to capture
  // the unique solution even for puzzles needing deeper reasoning.
  function solveDFS() {
    const start = solverStartingState();
    const rec = (s) => {
      if (!solverPropagate(s)) return null;
      let target = null;
      outer: for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++) {
          if (!isClueCell(r, c) && s[r][c] === 0) { target = [r, c]; break outer; }
        }
      if (!target) return s;
      for (const v of [1, 2]) {
        const t = s.map(row => row.slice());
        t[target[0]][target[1]] = v;
        const r = rec(t);
        if (r) return r;
      }
      return null;
    };
    return rec(start);
  }
  function solverStartingState() {
    const s = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    for (const key in givens) {
      const [r, c] = key.split(",").map(Number);
      s[r][c] = 1;
    }
    return s;
  }
  function computeDifficulty() {
    buildSolverTables();
    const res = solveNishio(2); // cap at depth 2 so page load stays snappy
    DIFFICULTY_DEPTH = res.solved ? res.maxUsed : null;
    let solution = res.solution || null;
    if (!solution) solution = solveDFS();
    if (puzzleDefs[currentCategory]) {
      puzzleDefs[currentCategory].difficulty = DIFFICULTY_DEPTH;
      puzzleDefs[currentCategory].solution = solution;
    }
  }
  function difficultyLabel() {
    if (DIFFICULTY_DEPTH == null) return null;
    return DIFF_LABELS[Math.min(DIFFICULTY_DEPTH, DIFF_LABELS.length - 1)];
  }

  // Cell states: 0 empty, 1 berry, 2 mark. Click cycles 0 -> 2 -> 1 -> 0.
  // Multi-category support: 3 puzzles per day, unlocked sequentially.
  const CATEGORIES = ["Standard", "Advanced", "Expert"];
  const puzzleDefs = {}; // { cat: { SIZE, PER, clues, givens, groupOf, difficulty } }
  let currentCategory = "Standard";
  const STORE_PREFIX = "bbtrio:v5:";
  const todayKey = () => {
    const d = new Date();
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
  };
  const storeKey = (cat) => `${STORE_PREFIX}${todayKey()}:${cat}`;
  const HISTORY_MAX = 200;
  let state;
  let history;     // array of { state, finishedAt } snapshots BEFORE each action
  let accumulatedMs;  // total active time (visible + current category) saved so far
  let lastResumedAt;  // timestamp when the current active segment began, or null when paused
  let finishedAt;     // ms timestamp when the puzzle was solved (null while unsolved)
  function elapsedMs() {
    if (lastResumedAt !== null && !finishedAt) return accumulatedMs + (Date.now() - lastResumedAt);
    return accumulatedMs;
  }
  function pauseTimer() {
    if (lastResumedAt !== null) {
      accumulatedMs += Date.now() - lastResumedAt;
      lastResumedAt = null;
    }
  }
  function resumeTimer() {
    if (lastResumedAt === null && !finishedAt && !document.hidden) lastResumedAt = Date.now();
  }
  let moveLog;     // array of { t, r, c, from, to } — forward user clicks only
  let undoCount;   // number of undo button presses this attempt
  let tickHandle = null;
  const board = document.getElementById("board");
  const statusEl = document.getElementById("status");
  const timerEl = document.getElementById("timer");
  const undoBtn = document.getElementById("undo");
  const undoCountEl = document.getElementById("undo-count");

  function loadStore(cat = currentCategory) {
    try {
      const raw = localStorage.getItem(storeKey(cat));
      if (!raw) return null;
      const data = JSON.parse(raw);
      const pz = puzzleDefs[cat];
      if (!pz || !Array.isArray(data.state) || data.state.length !== pz.SIZE) return null;
      return data;
    } catch { return null; }
  }
  function saveStore() {
    try {
      localStorage.setItem(storeKey(currentCategory), JSON.stringify({
        state, accumulatedMs: elapsedMs(), finishedAt, history, moveLog, undoCount
      }));
    } catch {}
  }
  function clearStore(cat = currentCategory) {
    try { localStorage.removeItem(storeKey(cat)); } catch {}
  }
  function pruneOldStorage() {
    try {
      const prefix = STORE_PREFIX;
      const today = todayKey();
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix) && !k.startsWith(prefix + today)) {
          localStorage.removeItem(k);
        }
      }
    } catch {}
  }
  function cloneState(s) { return s.map(row => row.slice()); }
  function pushHistory() {
    history.push({ state: cloneState(state), finishedAt });
    if (history.length > HISTORY_MAX) history.shift();
    updateUndo();
  }
  function updateUndo() { undoBtn.disabled = history.length === 0; }

  function init(fresh = false) {
    const stored = fresh ? null : loadStore();
    // On Reset we want to keep the time already spent on this puzzle.
    const carryOver = fresh && (accumulatedMs !== undefined) ? elapsedMs() : 0;
    if (stored) {
      state = stored.state;
      accumulatedMs = Number.isFinite(stored.accumulatedMs) ? stored.accumulatedMs : 0;
      finishedAt = stored.finishedAt || null;
      history = Array.isArray(stored.history) ? stored.history : [];
      moveLog = Array.isArray(stored.moveLog) ? stored.moveLog : [];
      undoCount = Number.isFinite(stored.undoCount) ? stored.undoCount : 0;
    } else {
      state = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      // Reset keeps the timer by carrying over the already-accumulated time.
      accumulatedMs = carryOver;
      finishedAt = null;
      history = [];
      moveLog = [];
      undoCount = 0;
    }
    lastResumedAt = null;
    resumeTimer();
    if (!stored) saveStore();
    updateUndo();
    renderUndoCount();
    // Block iOS Safari double-tap-zoom over the whole board, including clue cells.
    // Must be on touchstart with preventDefault; touch-action: none isn't enough.
    board.ontouchstart = (e) => { e.preventDefault(); };
    board.innerHTML = "";
    board.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;
    board.style.gridTemplateRows = `repeat(${SIZE}, 1fr)`;
    buildBoardLabels();
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.r = r;
        cell.dataset.c = c;
        if (c === SIZE - 1) cell.classList.add("edge-r");
        if (r === SIZE - 1) cell.classList.add("edge-b");
        if (c < SIZE - 1 && groupOf[r][c] !== groupOf[r][c + 1]) cell.classList.add("br");
        if (r < SIZE - 1 && groupOf[r][c] !== groupOf[r + 1][c]) cell.classList.add("bb");
        const key = `${r},${c}`;
        if (isClueCell(r, c)) {
          cell.classList.add("clue");
          cell.textContent = clues[key];
        } else if (isGivenCell(r, c)) {
          cell.classList.add("given");
        } else {
          cell.addEventListener("pointerdown", (e) => onPointerDown(e, r, c));
          cell.addEventListener("contextmenu", (e) => { e.preventDefault(); onCellClick(r, c, -1); });
        }
        board.appendChild(cell);
      }
    }
    setStatus("");
    const aEl = document.getElementById("analysis");
    if (aEl) aEl.innerHTML = "";
    render();
    startTicking();
    renderTimer();
    autoCheck();
  }

  function onCellClick(r, c, dir = 1) {
    if (finishedAt) return;
    if (isClueCell(r, c) || isGivenCell(r, c)) return;
    // Forward cycle: empty -> mark -> berry -> empty  (delta = 2 mod 3)
    // Reverse cycle (right click): empty -> berry -> mark -> empty (delta = 1 mod 3)
    const delta = dir === -1 ? 1 : 2;
    const from = state[r][c];
    const to = (from + delta) % 3;
    pushHistory();
    state[r][c] = to;
    moveLog.push({ t: elapsedMs(), type: "click", r, c, from, to });
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
    render();
    saveStore();
    autoCheck();
  }

  // Swipe-to-paint: first cell cycles normally, subsequent cells under the drag
  // get set to the SAME state as the first cell's new value (no cycling).
  let swipe = null;
  function cellAtPoint(clientX, clientY) {
    const el = document.elementFromPoint(clientX, clientY);
    if (!el) return null;
    const cell = el.closest && el.closest(".cell");
    if (!cell || cell.parentElement !== board) return null;
    const r = Number(cell.dataset.r), c = Number(cell.dataset.c);
    if (!Number.isInteger(r) || !Number.isInteger(c)) return null;
    return { r, c };
  }
  function setCellTo(r, c, to) {
    if (finishedAt) return;
    if (isClueCell(r, c) || isGivenCell(r, c)) return;
    const from = state[r][c];
    if (from === to) return;
    pushHistory();
    state[r][c] = to;
    moveLog.push({ t: elapsedMs(), type: "click", r, c, from, to, cont: true });
    render();
    saveStore();
    autoCheck();
  }
  function onPointerDown(ev, r, c) {
    if (ev.button === 2) return; // right-click is handled separately
    if (finishedAt) return;
    if (isClueCell(r, c) || isGivenCell(r, c)) return;
    ev.preventDefault();
    onCellClick(r, c);
    swipe = { to: state[r][c] };
    window.addEventListener("pointermove", onPointerMove);
    window.addEventListener("pointerup", onPointerUp);
    window.addEventListener("pointercancel", onPointerUp);
    window.addEventListener("blur", onPointerUp);
  }
  function onPointerMove(ev) {
    if (!swipe) return;
    ev.preventDefault();
    const hit = cellAtPoint(ev.clientX, ev.clientY);
    if (!hit) return;
    setCellTo(hit.r, hit.c, swipe.to);
  }
  function onPointerUp() {
    swipe = null;
    window.removeEventListener("pointermove", onPointerMove);
    window.removeEventListener("pointerup", onPointerUp);
    window.removeEventListener("pointercancel", onPointerUp);
    window.removeEventListener("blur", onPointerUp);
  }

  function undo() {
    if (!history.length) return;
    const prev = history.pop();
    state = prev.state.map(row => row.slice());
    const wasFinished = !!finishedAt;
    finishedAt = prev.finishedAt || null;
    if (wasFinished && !finishedAt) {
      setStatus("");
      resumeTimer();
      startTicking();
    }
    undoCount++;
    moveLog.push({ t: elapsedMs(), type: "undo" });
    renderUndoCount();
    updateUndo();
    render();
    saveStore();
    autoCheck();
  }

  function isClueSatisfied(r, c) {
    // Matches circle9's "satisfied2": count == clue AND no open neighbors.
    const want = clues[`${r},${c}`];
    if (want == null) return false;
    let berries = 0, open = 0;
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nc < 0 || nr >= SIZE || nc >= SIZE) continue;
        if (isClueCell(nr, nc)) continue;
        if (isBerry(nr, nc)) berries++;
        else if (state[nr][nc] === 0) open++;
      }
    return berries === want && open === 0;
  }
  function render() {
    for (const cell of board.children) {
      const r = +cell.dataset.r, c = +cell.dataset.c;
      cell.classList.remove("bad");
      if (cell.classList.contains("clue")) {
        cell.classList.toggle("satisfied", isClueSatisfied(r, c));
        continue;
      }
      cell.innerHTML = "";
      if (isGivenCell(r, c) || state[r][c] === 1) {
        const b = document.createElement("div");
        b.className = "berry";
        cell.appendChild(b);
      } else if (state[r][c] === 2) {
        const m = document.createElement("div");
        m.className = "mark";
        m.textContent = "×";
        cell.appendChild(m);
      }
    }
  }

  function isBerry(r, c) {
    if (isClueCell(r, c)) return false;
    if (isGivenCell(r, c)) return true;
    return state[r][c] === 1;
  }

  function countNeighbors(r, c) {
    let n = 0;
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nc < 0 || nr >= SIZE || nc >= SIZE) continue;
        if (isBerry(nr, nc)) n++;
      }
    }
    return n;
  }

  function autoCheck() {
    if (analysisVisible) renderAnalysis();
    // Need exactly PER berries in every row, column, and block, and every clue satisfied.
    for (let r = 0; r < SIZE; r++) {
      let n = 0;
      for (let c = 0; c < SIZE; c++) if (isBerry(r, c)) n++;
      if (n !== PER) { setStatus(""); return; }
    }
    for (let c = 0; c < SIZE; c++) {
      let n = 0;
      for (let r = 0; r < SIZE; r++) if (isBerry(r, c)) n++;
      if (n !== PER) { setStatus(""); return; }
    }
    const blk = {};
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (isBerry(r, c)) blk[blockId(r, c)] = (blk[blockId(r, c)] || 0) + 1;
      }
    }
    const blockIds = new Set();
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) blockIds.add(blockId(r, c));
    for (const id of blockIds) if ((blk[id] || 0) !== PER) { setStatus(""); return; }
    for (const key in clues) {
      const [r, c] = key.split(",").map(Number);
      if (countNeighbors(r, c) !== clues[key]) { setStatus(""); return; }
    }
    if (!finishedAt) {
      pauseTimer();
      finishedAt = Date.now();
      moveLog.push({ t: elapsedMs(), type: "solve" });
      saveStore();
      markCompleted(currentCategory);
      stopTicking();
      renderTimer();
      renderTabs();
    updateLogButtonVis();
      // Best-effort auto-sync if Supabase is configured (config.json or localStorage).
      if (supabaseEndpoint()) syncToSupabase(null);
    }
    const label = difficultyLabel();
    const parts = ["Solved!"];
    if (label) parts.push(label);
    if (undoCount > 0) parts.push(`${undoCount} undo`);
    setStatus(parts.join(" · "), true);
    renderAnalysis();
  }

  function renderUndoCount() {
    if (!undoCountEl) return;
    undoCountEl.textContent = undoCount > 0 ? `${undoCount} undo` : "";
  }

  function formatTime(ms) {
    const s = Math.max(0, Math.floor(ms / 1000));
    const hh = Math.floor(s / 3600);
    const mm = Math.floor((s % 3600) / 60);
    const ss = s % 60;
    const pad = (n) => n.toString().padStart(2, "0");
    return hh > 0 ? `${hh}:${pad(mm)}:${pad(ss)}` : `${pad(mm)}:${pad(ss)}`;
  }
  function renderTimer() {
    timerEl.textContent = formatTime(elapsedMs());
    timerEl.classList.toggle("win", !!finishedAt);
  }
  function startTicking() {
    stopTicking();
    if (finishedAt) return;
    tickHandle = setInterval(renderTimer, 500);
  }
  function stopTicking() {
    if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
  }

  function isOpen(r, c) {
    if (isClueCell(r, c) || isGivenCell(r, c)) return false;
    return state[r][c] === 0; // empty cell could still become a berry
  }
  function openNeighbors(r, c) {
    let n = 0;
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr < 0 || nc < 0 || nr >= SIZE || nc >= SIZE) continue;
        if (isOpen(nr, nc)) n++;
      }
    return n;
  }

  function fullCheck() {
    const problems = [];
    const tallyLine = (cells, label) => {
      let berries = 0, open = 0;
      for (const [r, c] of cells) {
        if (isBerry(r, c)) berries++;
        else if (isOpen(r, c)) open++;
      }
      if (berries > PER) {
        cells.forEach(([r, c]) => { if (isBerry(r, c)) markBad(r, c); });
        problems.push(`${label} has ${berries} berries`);
      } else if (berries + open < PER) {
        cells.forEach(([r, c]) => { if (state[r][c] === 2) markBad(r, c); });
        problems.push(`${label} can't reach ${PER} (${berries} + ${open} open)`);
      }
    };
    for (let r = 0; r < SIZE; r++) {
      const cells = [];
      for (let c = 0; c < SIZE; c++) cells.push([r, c]);
      tallyLine(cells, `row ${r + 1}`);
    }
    for (let c = 0; c < SIZE; c++) {
      const cells = [];
      for (let r = 0; r < SIZE; r++) cells.push([r, c]);
      tallyLine(cells, `column ${c + 1}`);
    }
    const blockCells = {};
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        (blockCells[blockId(r, c)] ||= []).push([r, c]);
    for (const b in blockCells) tallyLine(blockCells[b], "a block");

    for (const key in clues) {
      const [r, c] = key.split(",").map(Number);
      const want = clues[key];
      const got = countNeighbors(r, c);
      const open = openNeighbors(r, c);
      if (got > want) {
        markBad(r, c);
        problems.push(`clue ${want} at row ${r + 1}, col ${c + 1} sees ${got}`);
      } else if (got + open < want) {
        markBad(r, c);
        problems.push(`clue ${want} at row ${r + 1}, col ${c + 1} can't reach ${want}`);
      }
    }
    if (problems.length === 0) {
      autoCheck();
      if (!statusEl.classList.contains("win")) setStatus("No conflicts so far.");
    } else {
      setStatus(problems[0] + (problems.length > 1 ? ` (+${problems.length - 1} more)` : ""), false, true);
    }
  }

  function markBad(r, c) {
    const idx = r * SIZE + c;
    board.children[idx].classList.add("bad");
  }

  function setStatus(text, win = false, bad = false) {
    statusEl.textContent = text;
    statusEl.classList.toggle("win", !!win);
    statusEl.style.color = bad ? "var(--bad)" : "";
  }

  // Chess-style coordinates: rows 1-9 top to bottom, columns a-i left to right.
  const rowLabel = (r) => String(r + 1);
  const colLabel = (c) => String.fromCharCode(97 + c);
  const cellLabel = (r, c) => `${colLabel(c)}${rowLabel(r)}`;

  function buildBoardLabels() {
    const cEl = document.getElementById("col-labels");
    const rEl = document.getElementById("row-labels");
    if (cEl) {
      cEl.innerHTML = "";
      cEl.style.gridTemplateColumns = `repeat(${SIZE}, 1fr)`;
      for (let c = 0; c < SIZE; c++) {
        const d = document.createElement("div");
        d.textContent = colLabel(c);
        cEl.appendChild(d);
      }
    }
    if (rEl) {
      rEl.innerHTML = "";
      rEl.style.gridTemplateRows = `repeat(${SIZE}, 1fr)`;
      for (let r = 0; r < SIZE; r++) {
        const d = document.createElement("div");
        d.textContent = rowLabel(r);
        rEl.appendChild(d);
      }
    }
  }

  function blockLabel(bid) {
    const cells = [];
    let minR = SIZE, maxR = -1, minC = SIZE, maxC = -1;
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (groupOf[r][c] === bid) {
          cells.push([r, c]);
          if (r < minR) minR = r; if (r > maxR) maxR = r;
          if (c < minC) minC = c; if (c > maxC) maxC = c;
        }
    // Rectangular block → compact range form.
    if ((maxR - minR + 1) * (maxC - minC + 1) === cells.length) {
      const rows = minR === maxR ? rowLabel(minR) : `${rowLabel(minR)}-${rowLabel(maxR)}`;
      const cols = minC === maxC ? colLabel(minC) : `${colLabel(minC)}-${colLabel(maxC)}`;
      return `block(${rows}, ${cols})`;
    }
    // Irregular block → point to its top-left cell (smallest col on the top row).
    let topLeftC = SIZE;
    for (const [r, c] of cells) if (r === minR && c < topLeftC) topLeftC = c;
    return `block(containing ${cellLabel(minR, topLeftC)})`;
  }

  function computeSatisfied(state) {
    const out = new Set();
    // Rows
    for (let r = 0; r < SIZE; r++) {
      let b = 0, o = 0;
      for (let c = 0; c < SIZE; c++) {
        if (isClueCell(r, c)) continue;
        if (state[r][c] === 1) b++;
        else if (state[r][c] === 0) o++;
      }
      if (b === PER && o === 0) out.add(`row(${rowLabel(r)})`);
    }
    // Cols
    for (let c = 0; c < SIZE; c++) {
      let b = 0, o = 0;
      for (let r = 0; r < SIZE; r++) {
        if (isClueCell(r, c)) continue;
        if (state[r][c] === 1) b++;
        else if (state[r][c] === 0) o++;
      }
      if (b === PER && o === 0) out.add(`col(${colLabel(c)})`);
    }
    // Blocks
    const bids = new Set();
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) bids.add(groupOf[r][c]);
    for (const bid of bids) {
      let b = 0, o = 0;
      for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
        if (groupOf[r][c] !== bid || isClueCell(r, c)) continue;
        if (state[r][c] === 1) b++;
        else if (state[r][c] === 0) o++;
      }
      if (b === PER && o === 0) out.add(blockLabel(bid));
    }
    // Clues
    for (const key in clues) {
      const [r, c] = key.split(",").map(Number);
      const want = clues[key];
      let b = 0, o = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nc < 0 || nr >= SIZE || nc >= SIZE) continue;
          if (isClueCell(nr, nc)) continue;
          if (state[nr][nc] === 1) b++;
          else if (state[nr][nc] === 0) o++;
        }
      if (b === want && o === 0) out.add(`clue(${cellLabel(r, c)}=${want})`);
    }
    return out;
  }

  function buildAnalysis() {
    const sz = SIZE;
    const empty = () => Array.from({ length: sz }, () => Array(sz).fill(0));
    const MISCLICK_MS = 2000;
    let finalState = (puzzleDefs[currentCategory] || {}).solution;

    // Step 1: group click events into 'actions'. An action is either a
    // single tap, a swipe (leading click + cont:true clicks), or a cycle
    // (two clicks on the same cell within 2 s). Non-click events are
    // standalone actions.
    const actions = [];
    let ai = 0;
    while (ai < moveLog.length) {
      const e = moveLog[ai];
      if (e.type !== "click") { actions.push({ type: e.type, t: e.t, indices: [ai] }); ai++; continue; }
      const idx = [ai]; let j = ai + 1;
      while (j < moveLog.length) {
        const f = moveLog[j];
        if (f.type !== "click") break;
        if (f.cont) { idx.push(j); j++; continue; }
        const prev = moveLog[idx[idx.length - 1]];
        if (f.r === prev.r && f.c === prev.c && f.t - prev.t < 2000) { idx.push(j); j++; continue; }
        break;
      }
      actions.push({ type: "click", t: e.t, indices: idx });
      ai = j;
    }

    // Step 2: replay to get final state.
    let s = empty();
    const stack = [];
    const snapshots = [];
    for (const e of moveLog) {
      if (e.type === "click") { stack.push(s.map(r => r.slice())); s[e.r][e.c] = e.to; }
      else if (e.type === "undo") { if (stack.length) s = stack.pop(); }
      else if (e.type === "reset") { stack.push(s.map(r => r.slice())); s = empty(); }
      snapshots.push({ t: e.t, state: s.map(r => r.slice()) });
      if (e.type === "solve") break;
    }
    if (!finalState) finalState = s;

    // A click is a 'misclick' if the same cell returns to its pre-click value
    // within MISCLICK_MS (via undo, a cycle of clicks, or a reset).
    const misclick = new Array(moveLog.length).fill(false);
    for (let i = 0; i < moveLog.length; i++) {
      const e = moveLog[i];
      if (e.type !== "click") continue;
      for (let j = i + 1; j < snapshots.length; j++) {
        if (snapshots[j].t - e.t > MISCLICK_MS) break;
        if (snapshots[j].state[e.r][e.c] === e.from) { misclick[i] = true; break; }
      }
    }

    // Step 3: classify each action.
    // For a click action, walk its events applying them to a fresh state per
    // the replay (to get the state *after* the action). Each cell touched by
    // the action ends with some value; compare to the solution. Action is
    // 'good' if every touched cell's final value equals solution value.
    s = empty(); stack.length = 0;
    const classifyClickAction = (a) => {
      const satBefore = computeSatisfied(s);
      const touched = new Map();
      for (const idx of a.indices) {
        const e = moveLog[idx];
        stack.push(s.map(r => r.slice()));
        s[e.r][e.c] = e.to;
        touched.set(`${e.r},${e.c}`, e.to);
      }
      let allGood = true;
      for (const [key, v] of touched) {
        const [r, c] = key.split(",").map(Number);
        if (finalState[r][c] !== v) { allGood = false; break; }
      }
      const satAfter = computeSatisfied(s);
      const newlySat = [...satAfter].filter(x => !satBefore.has(x));
      return { label: allGood ? "good" : "trial", touched, newlySat };
    };
    const actionInfo = [];
    for (const a of actions) {
      if (a.type === "click") {
        const info = classifyClickAction(a);
        actionInfo.push({ ...a, label: info.label, touched: info.touched, newlySat: info.newlySat });
      } else if (a.type === "undo") {
        if (stack.length) s = stack.pop();
        actionInfo.push({ ...a, label: "undo" });
      } else if (a.type === "reset") {
        stack.push(s.map(r => r.slice())); s = empty();
        actionInfo.push({ ...a, label: "reset" });
      } else {
        actionInfo.push({ ...a, label: "system" });
      }
    }

    // Step 4: emit one entry per good action, describing the preceding gap.
    const out = [];
    let lastGoodT = 0;
    let trialStart = null;
    let trialCounts = { actions: 0, undos: 0, resets: 0, misclicks: 0 };
    const resetTrial = () => { trialStart = null; trialCounts = { actions: 0, undos: 0, resets: 0, misclicks: 0 }; };
    for (const a of actionInfo) {
      if (a.label === "good") {
        let gap;
        if (trialStart !== null) gap = { kind: "trial", dur: a.t - trialStart, ...trialCounts };
        else gap = { kind: "thinking", dur: a.t - lastGoodT };
        const cellCount = a.touched.size;
        const clickCount = a.indices.length;
        const kind = cellCount > 1 ? "swipe" : (clickCount > 1 ? "cycle" : "tap");
        const lastEvent = moveLog[a.indices[a.indices.length - 1]];
        out.push({ t: a.t, endT: lastEvent.t, cells: cellCount, clicks: clickCount, kind, gap, newlySat: a.newlySat || [] });
        lastGoodT = lastEvent.t;
        resetTrial();
      } else if (a.label === "trial") {
        if (trialStart === null) trialStart = a.t;
        trialCounts.actions++;
        // misclick: any touched cell reverted to pre-action value within 2s
        const firstIdx = a.indices[0];
        const firstE = moveLog[firstIdx];
        for (let j = firstIdx + 1; j < snapshots.length; j++) {
          if (snapshots[j].t - firstE.t > MISCLICK_MS) break;
          if (snapshots[j].state[firstE.r][firstE.c] === firstE.from) { trialCounts.misclicks++; break; }
        }
      } else if (a.label === "undo") {
        if (trialStart === null) trialStart = a.t;
        trialCounts.undos++;
      } else if (a.label === "reset") {
        if (trialStart === null) trialStart = a.t;
        trialCounts.resets++;
      }
    }
    return out;
  }

  let analysisVisible = false;
  function updateLogButtonVis() {
    const btn = document.getElementById("log");
    if (!btn) return;
    // Show the Log button once the category has been solved at least once
    // today, so replays can watch it live.
    btn.style.display = categoryFinishedAt(currentCategory) ? "" : "none";
  }
  function renderAnalysis() {
    const el = document.getElementById("analysis");
    if (!el) return;
    el.innerHTML = "";
    if (!finishedAt && !analysisVisible) return;
    const moves = buildAnalysis();
    if (!moves.length) return;
    for (const m of moves) {
      const div = document.createElement("div");
      const at = formatTime(m.t);
      const g = m.gap;
      let gapText;
      if (g.kind === "thinking") {
        gapText = g.dur === 0 ? "" : `${formatTime(g.dur)} myślenia`;
      } else {
        const parts = [];
        if (g.actions) parts.push(`${g.actions} ruch${g.actions === 1 ? "" : "ów"}`);
        if (g.misclicks) parts.push(`${g.misclicks} pomyłk${g.misclicks === 1 ? "a" : (g.misclicks < 5 ? "i" : "")}`);
        if (g.undos) parts.push(`${g.undos} undo`);
        if (g.resets) parts.push(`${g.resets} reset`);
        gapText = `próba ${formatTime(g.dur)} (${parts.join(", ")})`;
      }
      let suffix = "";
      if (m.kind === "swipe") suffix = ` (swipe × ${m.cells})`;
      div.className = g.kind === "trial" ? "trial" : "good";
      let body = gapText ? `✓ ${at}${suffix} — ${gapText}` : `✓ ${at}${suffix}`;
      if (m.newlySat && m.newlySat.length) body += ` → ${m.newlySat.join(", ")}`;
      div.textContent = body;
      el.appendChild(div);
    }
  }

  const COMPLETED_KEY = () => `${STORE_PREFIX}${todayKey()}:completed`;
  function loadCompleted() {
    try {
      const raw = localStorage.getItem(COMPLETED_KEY());
      if (!raw) return {};
      return JSON.parse(raw);
    } catch { return {}; }
  }
  function markCompleted(cat) {
    const data = loadCompleted();
    data[cat] = Date.now();
    try { localStorage.setItem(COMPLETED_KEY(), JSON.stringify(data)); } catch {}
  }
  function isCategoryUnlocked(cat) {
    if (cat === "Standard") return true;
    const prev = cat === "Advanced" ? "Standard" : "Advanced";
    // Unlock is permanent once earned today (Reset on the previous category
    // shouldn't re-lock this one).
    const completed = loadCompleted();
    if (completed[prev]) return true;
    const stored = loadStore(prev);
    return !!(stored && stored.finishedAt);
  }
  function categoryFinishedAt(cat) {
    const stored = loadStore(cat);
    if (stored && stored.finishedAt) return stored.finishedAt;
    const completed = loadCompleted();
    return completed[cat] || null;
  }
  function renderTabs() {
    const tabs = document.getElementById("tabs");
    tabs.innerHTML = "";
    for (const cat of CATEGORIES) {
      const btn = document.createElement("button");
      btn.className = "tab";
      const unlocked = isCategoryUnlocked(cat);
      const done = categoryFinishedAt(cat);
      if (cat === currentCategory) btn.classList.add("active");
      if (!unlocked) btn.classList.add("locked");
      if (done) btn.classList.add("done");
      btn.type = "button";
      btn.textContent = unlocked
        ? (done ? `${cat} ✓` : cat)
        : `${cat} 🔒`;
      btn.disabled = !unlocked;
      if (unlocked) {
        btn.addEventListener("click", (e) => {
          switchCategory(cat);
          e.currentTarget.blur();
        });
      }
      tabs.appendChild(btn);
    }
  }
  function switchCategory(cat) {
    if (cat === currentCategory) return;
    if (!isCategoryUnlocked(cat)) return;
    pauseTimer();           // freeze previous category's clock
    const from = currentCategory;
    moveLog.push({ t: elapsedMs(), type: "switch_out", to: cat });
    saveStore();            // persist with frozen accumulatedMs
    stopTicking();
    currentCategory = cat;
    activateCategoryPuzzle(cat);
    buildSolverTables();
    init(false);
    moveLog.push({ t: elapsedMs(), type: "switch_in", from });
    saveStore();
    renderTabs();
    updateLogButtonVis();
  }
  function resetBoard() {
    const wasEverSolved = !!categoryFinishedAt(currentCategory);
    if (wasEverSolved) {
      // Replay mode: wipe all history so the fresh run starts clean.
      state = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      history = [];
      moveLog = [];
      undoCount = 0;
      analysisVisible = false;
      document.getElementById("log").classList.remove("active");
      const aEl = document.getElementById("analysis");
      if (aEl) aEl.innerHTML = "";
    } else {
      // First attempt: preserve history/log so Reset itself is reversible.
      pushHistory();
      state = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      moveLog.push({ t: elapsedMs(), type: "reset" });
    }
    if (finishedAt) {
      finishedAt = null;
      setStatus("");
      resumeTimer();
      startTicking();
    }
    renderUndoCount();
    updateUndo();
    updateLogButtonVis();
    render();
    saveStore();
    autoCheck();
  }
  document.getElementById("reset").addEventListener("click", (e) => {
    resetBoard();
    e.currentTarget.blur();
  });
  document.getElementById("check").addEventListener("click", (e) => { fullCheck(); e.currentTarget.blur(); });
  document.getElementById("log").addEventListener("click", (e) => {
    analysisVisible = !analysisVisible;
    e.currentTarget.classList.toggle("active", analysisVisible);
    renderAnalysis();
    e.currentTarget.blur();
  });
  undoBtn.addEventListener("click", (e) => { undo(); e.currentTarget.blur(); });
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      moveLog.push({ t: elapsedMs(), type: "hide" });
      pauseTimer();
      saveStore();
      stopTicking();
    } else {
      resumeTimer();
      moveLog.push({ t: elapsedMs(), type: "show" });
      saveStore();
      renderTimer();
      startTicking();
    }
  });
  window.addEventListener("pagehide", () => { pauseTimer(); saveStore(); });

  async function fetchText(url) {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error(`${url} HTTP ${res.status}`);
    return res.text();
  }
  async function renderBuildInfo() {
    const el = document.getElementById("build-info");
    if (!el) return;
    el.innerHTML = "";
    const dl = document.createElement("a");
    dl.href = "#";
    dl.className = "dl";
    dl.textContent = "⬇ log";
    dl.addEventListener("click", (e) => { e.preventDefault(); downloadLog(); });
    el.appendChild(dl);
    const sync = document.createElement("a");
    sync.href = "#";
    sync.className = "dl";
    sync.textContent = "↑ sync";
    sync.title = "Save session JSON to GitHub repo";
    sync.addEventListener("click", (e) => { e.preventDefault(); syncToSupabase(sync); });
    el.appendChild(sync);
    try {
      const res = await fetch("version.json", { cache: "no-store" });
      if (!res.ok) return;
      const v = await res.json();
      const built = v.built ? v.built.replace(/[TZ]/g, " ").trim() : "";
      const repo = "https://github.com/jwolosiuk/bbtrio-clone";
      const span = document.createElement("span");
      span.innerHTML = `<a href="${repo}/commit/${v.fullSha || v.sha}" target="_blank" rel="noopener">${v.sha || ""}</a> · ${built}`;
      el.appendChild(span);
    } catch {}
  }
  function buildSnapshot() {
    pauseTimer();
    saveStore();
    resumeTimer();
    const today = todayKey();
    const snapshot = {
      date: today,
      currentCategory,
      completed: loadCompleted(),
      categories: {},
    };
    for (const cat of CATEGORIES) snapshot.categories[cat] = loadStore(cat);
    return { today, snapshot };
  }
  const SUPA_URL_KEY = "bbtrio:supa-url";
  const SUPA_KEY_KEY = "bbtrio:supa-key";
  const DEVICE_ID_KEY = "bbtrio:device-id";
  let appConfig = { supabase_url: "", supabase_anon_key: "" };
  function getDeviceId() {
    let id = localStorage.getItem(DEVICE_ID_KEY);
    if (!id) {
      id = (crypto && crypto.randomUUID) ? crypto.randomUUID()
        : `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
      localStorage.setItem(DEVICE_ID_KEY, id);
    }
    return id;
  }
  function supabaseEndpoint() {
    // Priority: localStorage override (per-device custom project) → config.json baked in.
    const url = localStorage.getItem(SUPA_URL_KEY) || appConfig.supabase_url;
    const key = localStorage.getItem(SUPA_KEY_KEY) || appConfig.supabase_anon_key;
    return url && key ? { url: url.replace(/\/$/, ""), key } : null;
  }
  async function syncToSupabase(linkEl) {
    let endpoint = supabaseEndpoint();
    if (!endpoint) {
      const url = window.prompt("Supabase URL (https://xxx.supabase.co):");
      if (!url) return false;
      const key = window.prompt("Supabase anon key (eyJ...):");
      if (!key) return false;
      localStorage.setItem(SUPA_URL_KEY, url.trim().replace(/\/$/, ""));
      localStorage.setItem(SUPA_KEY_KEY, key.trim());
      endpoint = supabaseEndpoint();
      if (!endpoint) return false;
    }
    const deviceId = getDeviceId();
    const { today, snapshot } = buildSnapshot();
    const cat = (snapshot.categories || {})[currentCategory] || {};
    const body = {
      device_id: deviceId,
      category: currentCategory,
      puzzle_date: today,
      total_ms: Number.isFinite(cat.accumulatedMs) ? Math.round(cat.accumulatedMs) : null,
      undo_count: Number.isFinite(cat.undoCount) ? cat.undoCount : null,
      finished_at: cat.finishedAt ? new Date(cat.finishedAt).toISOString() : null,
      data: snapshot,
    };
    if (linkEl) linkEl.textContent = "↑ ...";
    try {
      const res = await fetch(`${endpoint.url}/rest/v1/sessions`, {
        method: "POST",
        headers: {
          "apikey": endpoint.key,
          "Authorization": `Bearer ${endpoint.key}`,
          "Content-Type": "application/json",
          "x-device-id": deviceId,
          "Prefer": "return=minimal",
        },
        body: JSON.stringify(body),
      });
      if (res.ok) {
        if (linkEl) { linkEl.textContent = "✓ saved"; setTimeout(() => { linkEl.textContent = "↑ sync"; }, 1500); }
        return true;
      }
      const err = await res.text();
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem(SUPA_KEY_KEY);
        alert(`Supabase odrzucił klucz (${res.status}).\n${err.slice(0, 200)}`);
      } else {
        alert(`Sync failed: ${res.status}\n${err.slice(0, 300)}`);
      }
    } catch (err) {
      alert(`Sync error: ${err.message}`);
    } finally {
      if (linkEl && linkEl.textContent === "↑ ...") linkEl.textContent = "↑ sync";
    }
    return false;
  }
  function downloadLog() {
    pauseTimer();
    saveStore();
    resumeTimer();
    const today = todayKey();
    const snapshot = {
      date: today,
      currentCategory,
      completed: loadCompleted(),
      categories: {},
    };
    for (const cat of CATEGORIES) {
      snapshot.categories[cat] = loadStore(cat);
    }
    const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `bbtrio-${today}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
  // cyrb53 from https://github.com/bryc/code/blob/master/jshash/experimental/cyrb53.js
  function cyrb53(str, seed = 0) {
    let h1 = 0xdeadbeef ^ seed, h2 = 0x41c6ce57 ^ seed;
    for (let i = 0, ch; i < str.length; i++) {
      ch = str.charCodeAt(i);
      h1 = Math.imul(h1 ^ ch, 2654435761);
      h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507);
    h1 ^= Math.imul(h2 ^ (h2 >>> 13), 3266489909);
    h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507);
    h2 ^= Math.imul(h1 ^ (h1 >>> 13), 3266489909);
    return 4294967296 * (2097151 & h2) + (h1 >>> 0);
  }
  const CAT_KEY = { Standard: "S", Advanced: "A", Expert: "E" };
  function pickDailyEntry(pool, cat, date) {
    const ds = `${date.getDate()} ${date.getMonth() + 1} ${date.getFullYear()}`;
    const lst = pool[CAT_KEY[cat]];
    return lst[cyrb53(`${ds} ${cat} Daily 0`) % lst.length];
  }
  function entryToPuzzleText(entry) {
    const [blocks, clues] = entry.split("|");
    const cellLines = [], groupLines = [];
    for (let r = 0; r < 9; r++) {
      let cRow = "", gRow = "";
      for (let c = 0; c < 9; c++) {
        cRow += clues[r * 9 + c];
        gRow += String.fromCharCode(65 + (blocks.charCodeAt(r * 9 + c) - 48));
      }
      cellLines.push(cRow);
      groupLines.push(gRow);
    }
    return cellLines.join("\n") + "\n\n" + groupLines.join("\n");
  }
  async function loadAppConfig() {
    try {
      const res = await fetch("config.json", { cache: "no-store" });
      if (!res.ok) return;
      appConfig = await res.json();
    } catch {}
  }
  async function boot() {
    await loadAppConfig();
    renderBuildInfo();
    pruneOldStorage();
    let pool;
    try {
      const res = await fetch("puzzles.json", { cache: "force-cache" });
      if (!res.ok) throw new Error(`puzzles.json HTTP ${res.status}`);
      pool = await res.json();
    } catch (err) {
      console.warn("using fallback puzzle, puzzles.json missing:", err.message);
      // Minimal fallback keeps the app playable offline.
      applyPuzzle(FALLBACK_PUZZLE);
      buildSolverTables();
      computeDifficulty();
      puzzleDefs.Standard = { SIZE, PER, clues, givens, groupOf, difficulty: DIFFICULTY_DEPTH };
      puzzleDefs.Advanced = puzzleDefs.Standard;
      puzzleDefs.Expert = puzzleDefs.Standard;
      currentCategory = "Standard";
      activateCategoryPuzzle("Standard");
      buildSolverTables();
      init();
      renderTabs();
    updateLogButtonVis();
      return;
    }
    const today = new Date();
    for (const cat of CATEGORIES) {
      const text = entryToPuzzleText(pickDailyEntry(pool, cat, today));
      const p = parsePuzzle(text);
      puzzleDefs[cat] = { ...p, difficulty: null };
    }
    // Compute difficulty per category.
    for (const cat of CATEGORIES) {
      currentCategory = cat;
      activateCategoryPuzzle(cat);
      computeDifficulty();
    }
    // Pick the first unlocked-but-unsolved category, else the last unlocked.
    let initial = "Standard";
    for (const cat of CATEGORIES) {
      if (!isCategoryUnlocked(cat)) break;
      if (!categoryFinishedAt(cat)) { initial = cat; break; }
      initial = cat;
    }
    currentCategory = initial;
    activateCategoryPuzzle(initial);
    buildSolverTables();
    init();
    renderTabs();
    updateLogButtonVis();
  }
  window.__bbtrio = () => ({
    currentCategory,
    moveLog: moveLog.slice(),
    undoCount,
    accumulatedMs,
    lastResumedAt,
    finishedAt,
    elapsedMs: elapsedMs(),
    state: state.map(row => row.slice()),
    clues: { ...clues },
    givens: { ...givens },
    groupOf: groupOf.map(row => row.slice()),
    difficulty: DIFFICULTY_DEPTH,
    categoryStatus: Object.fromEntries(CATEGORIES.map(c => [c, {
      unlocked: isCategoryUnlocked(c),
      finishedAt: categoryFinishedAt(c),
      difficulty: (puzzleDefs[c] || {}).difficulty,
    }])),
  });
  boot();
})();
</script>
