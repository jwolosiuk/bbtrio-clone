name: probe-solve
on:
  push:
    paths: ['.github/workflows/probe-solve.yml']
permissions:
  contents: write
jobs:
  p:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p .probe
          curl -sSL -A "bbtrio-clone" -o .probe/solve.js https://circle9puzzle.com/blueberry/blueberry.solve.js
          wc -c .probe/solve.js
          git config user.name "probe-bot"; git config user.email "probe@noreply"
          git add .probe/solve.js
          git diff --cached --quiet && echo nop || (git commit -m "probe solve [skip stamp]" && git push)
