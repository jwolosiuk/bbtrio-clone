name: stamp-version
on:
  push:
    branches: [main]
    paths-ignore:
      - 'version.json'

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write version.json
        run: |
          SHA=${GITHUB_SHA::7}
          MSG=$(git log -1 --pretty=%s "$GITHUB_SHA" | sed 's/"/\\"/g')
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{"sha":"%s","fullSha":"%s","built":"%s","message":"%s"}\n' \
            "$SHA" "$GITHUB_SHA" "$DATE" "$MSG" > version.json
          cat version.json

      - name: Commit stamp
        run: |
          git config user.name "version-stamp-bot"
          git config user.email "version-stamp@users.noreply.github.com"
          git add version.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "[skip stamp] version $GITHUB_SHA"
            git push
          fi
