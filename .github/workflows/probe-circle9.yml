name: probe-circle9
on:
  push:
    paths:
      - '.github/workflows/probe-circle9.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch candidate URLs
        run: |
          set -x
          mkdir -p .probe
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126 Safari/537.36"
          for url in \
            "https://circle9puzzle.com/bbtrio/" \
            "https://circle9puzzle.com/bbtrio/index.html" \
            "https://circle9puzzle.com/" \
          ; do
            slug=$(echo "$url" | sed 's|https://||; s|[/.:?&=]|_|g')
            echo "=== $url ==="
            curl -sSL -A "$UA" -D ".probe/${slug}.headers.txt" -o ".probe/${slug}.html" "$url" || echo "fetch failed: $url"
            ls -la ".probe/${slug}."* || true
            echo "--- first 200 lines ---"
            head -200 ".probe/${slug}.html" 2>/dev/null || true
            echo "--- size ---"
            wc -c ".probe/${slug}.html" 2>/dev/null || true
          done

      - name: Look for JS / data references
        run: |
          cd .probe
          echo "=== grep for puzzle-like keywords ==="
          for f in *.html; do
            echo "--- $f ---"
            grep -iE "puzzle|berry|daily|grid|clue|region|block|script src|json" "$f" | head -30 || true
          done
          echo "=== list all script/src/link references ==="
          for f in *.html; do
            echo "--- $f ---"
            grep -oE '(src|href)="[^"]*"' "$f" | sort -u | head -40 || true
          done

      - name: Commit probe results
        run: |
          git config user.name "probe-bot"
          git config user.email "probe@users.noreply.github.com"
          git add .probe/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "probe: fetch circle9puzzle.com results"
            git push
          fi
